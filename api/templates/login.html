{% extends 'base.html' %}
{% block title %}Вход - MLM Panel{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-8">
  <h2 class="text-2xl font-semibold mb-4">Вход в панель</h2>
  {% if error %}
  <div class="mb-4 text-red-700 bg-red-100 p-3 rounded">{{ error }}</div>
  {% endif %}
  <form method="post" action="/token" class="space-y-4">
    <label class="block text-sm font-medium text-slate-700">Пароль</label>
    <input type="password" name="password" class="w-full rounded-lg border border-slate-300 px-4 py-2" required />
    <button type="submit" class="w-full py-2 rounded-lg bg-sky-600 text-white font-semibold">Войти</button>
  </form>
</div>
{% endblock %}
