{% extends 'base.html' %}
{% block title %}Меню{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-6">
  <h2 class="text-xl font-semibold mb-4">Меню бота</h2>
  <div class="mb-6">
    <h3 class="text-lg font-medium mb-2">Добавить пункт меню</h3>
    <form method="post" action="/menu/add" class="space-y-4">
      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-slate-700">Ключ</label>
          <input type="text" name="key" class="w-full rounded-lg border border-slate-300 px-4 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Заголовок</label>
          <input type="text" name="title" class="w-full rounded-lg border border-slate-300 px-4 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Родительский ключ</label>
          <input type="text" name="parent_key" class="w-full rounded-lg border border-slate-300 px-4 py-2" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Порядок сортировки</label>
          <input type="number" name="sort_order" class="w-full rounded-lg border border-slate-300 px-4 py-2" value="0" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Содержимое</label>
        <textarea name="content" rows="4" class="w-full rounded-lg border border-slate-300 px-4 py-2"></textarea>
      </div>
      <button type="submit" class="px-4 py-2 rounded-lg bg-sky-600 text-white font-semibold">Добавить</button>
    </form>
  </div>
  <div class="space-y-4">
    {% for item in menu_items %}
    <div class="border border-slate-200 rounded-xl p-4">
      <h3 class="font-semibold">{{ item.title }}</h3>
      <p class="text-sm text-slate-600">Ключ: {{ item.key or '—' }}</p>
      <p class="text-slate-700">{{ item.content or '-' }}</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
