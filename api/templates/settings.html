{% extends 'base.html' %}
{% block title %}Настройки{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-6">
  <h2 class="text-xl font-semibold mb-4">Настройки системы</h2>
  <div class="grid gap-4 md:grid-cols-2">
    {% for item in settings %}
    <div class="bg-slate-50 rounded-xl p-4">
      <form method="post" action="/settings/update" class="space-y-2">
        <div class="font-semibold">{{ item.key }}</div>
        <input type="hidden" name="key" value="{{ item.key }}" />
        <input type="text" name="value" value="{{ item.value }}" class="w-full rounded border border-slate-300 px-2 py-1" />
        <button type="submit" class="px-3 py-1 rounded bg-sky-600 text-white text-sm">Сохранить</button>
      </form>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
